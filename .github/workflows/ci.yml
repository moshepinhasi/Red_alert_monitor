name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-check:
    name: Syntax check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only the packages that don't require a display
          pip install httpx customtkinter

      - name: Check syntax
        run: python -m py_compile red_alert_monitor.py && echo "Syntax OK"

      - name: Lint with flake8
        run: |
          pip install flake8
          # Fail on syntax errors or undefined names; ignore line-length and style warnings
          flake8 red_alert_monitor.py --count --select=E9,F63,F7,F82 --show-source --statistics
